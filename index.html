<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호왕연 목패 발급소</title>
    <style>
        /* 기본 스타일 및 다크 테마 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Noto Sans KR', 'Noto Serif KR', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 메인 컨테이너: PC에서는 좌우 배치, 모바일에서는 상하 배치 */
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1300px;
            gap: 40px;
            background: #161616;
            border: 1px solid #2a221b;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        @media (min-width: 850px) {
            .container {
                flex-direction: row;
            }
        }

        /* 왼쪽: 정보 입력 영역 */
        .input-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 300px;
        }
        .input-section h2 {
            color: #c5a880;
            border-bottom: 2px solid #4a3b2c;
            padding-bottom: 12px;
            margin-bottom: 10px;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 0.95rem;
            color: #b5a494;
            font-weight: 500;
        }
        .form-group input {
            padding: 14px;
            background: #222222;
            border: 1px solid #443a30;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #c5a880;
            background: #2a2a2a;
            box-shadow: 0 0 8px rgba(197, 168, 128, 0.2);
        }
        .submit-btn {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #c5a880 0%, #a3855c 100%);
            color: #121212;
            border: none;
            border-radius: 6px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .submit-btn:hover {
            background: linear-gradient(135deg, #d9be96 0%, #b8996e 100%);
            transform: translateY(-2px);
        }
        .submit-btn:active {
            transform: translateY(0);
        }

        /* 오른쪽: 목패 미리보기 (Canvas) 영역 */
        .preview-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 25px;
        }
        .preview-section h2 {
            color: #c5a880;
            align-self: flex-start;
            font-size: 1.6rem;
        }
        .canvas-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            width: 100%;
        }
        .canvas-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .canvas-wrapper p {
            font-size: 1rem;
            color: #c5a880;
            font-weight: 600;
            letter-spacing: 2px;
        }
        /* Canvas가 화면을 벗어나지 않도록 반응형 처리 */
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            background: #1a1a1a;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="input-section">
        <h2>정보 입력</h2>
        <div class="form-group">
            <label for="inputName">이름</label>
            <input type="text" id="inputName" placeholder="이름을 입력하세요.">
        </div>
        <div class="form-group">
            <label for="inputRace">종족</label>
            <input type="text" id="inputRace" placeholder="종족을 입력하세요.">
        </div>
        <div class="form-group">
            <label for="inputSkill">재주</label>
            <input type="text" id="inputSkill" placeholder="재주를 입력하세요.">
        </div>
        <div class="form-group">
            <label for="inputNumber">번호</label>
            <input type="text" id="inputNumber" placeholder="예: 虎-017 (미입력 시 자동 생성)">
        </div>
        <button class="submit-btn" id="saveBtn">목패 발급하기</button>
    </div>

    <div class="preview-section">
        <h2>목패 미리보기</h2>
        <div class="canvas-container">
            <div class="canvas-wrapper">
                <p>✦ 앞면 (앞面) ✦</p>
                <canvas id="frontCanvas"></canvas>
            </div>
            <div class="canvas-wrapper">
                <p>✦ 뒷면 (뒷面) ✦</p>
                <canvas id="backCanvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. 원본 이미지 경로 설정 ---
    // 보유 중이신 실제 원본 배경 이미지의 파일명을 적어주세요.
    const FRONT_IMAGE_URL = 'front_bg.jpg'; 
    const BACK_IMAGE_URL = 'back_bg.jpg';   

    // --- 2. DOM 및 Canvas 설정 ---
    const frontCanvas = document.getElementById('frontCanvas');
    const backCanvas = document.getElementById('backCanvas');
    const ctxFront = frontCanvas.getContext('2d');
    const ctxBack = backCanvas.getContext('2d');

    const fields = {
        name: document.getElementById('inputName'),
        race: document.getElementById('inputRace'),
        skill: document.getElementById('inputSkill'),
        number: document.getElementById('inputNumber')
    };
    const saveBtn = document.getElementById('saveBtn');

    const imgFront = new Image();
    const imgBack = new Image();

    let imagesLoaded = 0;
    function checkAllImagesLoaded() {
        imagesLoaded++;
        if (imagesLoaded === 2) {
            frontCanvas.width = imgFront.width;
            frontCanvas.height = imgFront.height;
            backCanvas.width = imgBack.width;
            backCanvas.height = imgBack.height;
            render();
        }
    }

    imgFront.src = FRONT_IMAGE_URL;
    imgBack.src = BACK_IMAGE_URL;
    imgFront.onload = checkAllImagesLoaded;
    imgBack.onload = checkAllImagesLoaded;

    // --- 고풍스러운 동양풍 세로쓰기 함수 ---
    function drawTextVertical(ctx, text, x, y, lineHeight) {
        ctx.save();
        // 각 글자를 세로로 한 바이트씩 쪼개어 수직으로 정렬하여 드로잉
        for (let i = 0; i < text.length; i++) {
            let char = text.charAt(i);
            ctx.fillText(char, x, y + (i * lineHeight));
        }
        ctx.restore();
    }

    // --- 3. 실시간 렌더링 함수 (음각 각인 효과 포함) ---
    function render() {
        if (imagesLoaded < 2) return;

        // ==================== [ 앞면 렌더링 ] ====================
        ctxFront.clearRect(0, 0, frontCanvas.width, frontCanvas.height);
        ctxFront.drawImage(imgFront, 0, 0);

        ctxFront.save();
        // 짙은 목재 파임 칼라 및 정밀 음각 그림자 튜닝
        ctxFront.fillStyle = 'rgba(25, 12, 4, 0.88)'; 
        ctxFront.shadowColor = '#000000';              // 그림자 색상을 블랙으로 제어
        ctxFront.shadowBlur = 3;                       // 음각 파임 깊이감 묘사
        ctxFront.shadowOffsetX = -1.5;                  // 빛의 방향에 따른 음각 굴곡 표현
        ctxFront.shadowOffsetY = -1.5;
        ctxFront.textAlign = 'center';
        ctxFront.textBaseline = 'top';

        // 1. 이름 (정중앙 세로쓰기 레이아웃)
        if (fields.name.value) {
            ctxFront.font = 'bold 44px "Noto Serif KR", serif';
            // 이름 시작 위치 조정 (자간 높이 54px로 세로 배치)
            drawTextVertical(ctxFront, fields.name.value, frontCanvas.width / 2, frontCanvas.height * 0.32, 54);
        }
        
        // 2. 하단 종족 및 재주 각인
        ctxFront.font = '600 24px "Noto Serif KR", serif';
        ctxFront.shadowBlur = 1.5;
        ctxFront.shadowOffsetX = -1;
        ctxFront.shadowOffsetY = -1;
        
        let bottomY = frontCanvas.height * 0.72;
        if (fields.race.value) {
            ctxFront.fillText(`종족: ${fields.race.value}`, frontCanvas.width / 2, bottomY);
            bottomY += 38;
        }
        if (fields.skill.value) {
            ctxFront.fillText(`재주: ${fields.skill.value}`, frontCanvas.width / 2, bottomY);
        }
        ctxFront.restore();


        // ==================== [ 뒷면 렌더링 ] ====================
        ctxBack.clearRect(0, 0, backCanvas.width, backCanvas.height);
        ctxBack.drawImage(imgBack, 0, 0);

        ctxBack.save();
        // 낙인 도장 혹은 붉은 음각 각인 효과 적용
        ctxBack.fillStyle = 'rgba(115, 15, 15, 0.9)';
        ctxBack.shadowColor = '#000000';
        ctxBack.shadowBlur = 2.5;
        ctxBack.shadowOffsetX = -1;
        ctxBack.shadowOffsetY = -1;
        ctxBack.textAlign = 'center';
        
        ctxBack.font = 'bold 26px "Noto Serif KR", serif';
        let numText = fields.number.value || "虎-017"; 
        ctxBack.fillText(numText, backCanvas.width / 2, backCanvas.height * 0.84);
        ctxBack.restore();
    }

    // --- 4. 이벤트 리스너 (실시간 갱신) ---
    Object.values(fields).forEach(field => {
        field.addEventListener('input', render);
    });

    // --- 5. 고해상도 JPG 파일 발급 기능 ---
    saveBtn.addEventListener('click', () => {
        const fileNameBase = fields.name.value || '목패';
        
        // 앞면 추출
        const linkFront = document.createElement('a');
        linkFront.download = `${fileNameBase}_앞면.jpg`;
        linkFront.href = frontCanvas.toDataURL('image/jpeg', 0.95);
        linkFront.click();

        // 0.3초 시차 다운로드로 브라우저 충돌 방지
        setTimeout(() => {
            const linkBack = document.createElement('a');
            linkBack.download = `${fileNameBase}_뒷면.jpg`;
            linkBack.href = backCanvas.toDataURL('image/jpeg', 0.95);
            linkBack.click();
        }, 300);
    });
</script>

</body>
</html>
