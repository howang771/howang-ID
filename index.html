<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호왕연 목패 발급소</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0a08;
            color: #d4a773;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 1100px;
            height: 700px;
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid #33281d;
            border-radius: 12px;
            position: relative;
        }

        /* 왼쪽 정보 입력 창 */
        .input-panel {
            width: 320px;
            padding: 40px;
            border-right: 1px solid #33281d;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-main {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-main h1 {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }
        .logo-main p {
            font-size: 11px;
            color: #8a735c;
            margin: 5px 0 0 0;
            line-height: 1.4;
        }

        .form-title {
            font-size: 15px;
            color: #e0be97;
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
        }

        .form-group {
            width: 100%;
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: #8a735c;
            margin-bottom: 4px;
        }
        .form-group input {
            width: calc(100% - 16px);
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #33281d;
            color: #d4a773;
            font-size: 12px;
        }
        .form-group input::placeholder {
            color: #5d4f40;
        }

        /* 도깨비 옵션 제거됨 */

        .btn-issue {
            width: 100%;
            padding: 12px 0;
            background: linear-gradient(180deg, #5c422c 0%, #33281d 100%);
            border: 1px solid #8a735c;
            color: #e0be97;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5);
        }

        .notice-list {
            margin-top: 20px;
            font-size: 10px;
            color: #6d5d4d;
            list-style: none;
            padding: 0;
            width: 100%;
        }
        .notice-list li {
            margin-bottom: 4px;
            position: relative;
            padding-left: 10px;
        }
        .notice-list li::before {
            content: '*';
            position: absolute;
            left: 0;
        }

        /* 오른쪽 목패 프리뷰 */
        .preview-panel {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, #1a1511 0%, #0d0a08 100%);
            border-radius: 0 12px 12px 0;
        }

        .preview-header {
            text-align: right;
            margin-bottom: 30px;
        }
        .preview-header h2 {
            font-size: 18px;
            margin: 0;
        }
        .preview-header p {
            font-size: 10px;
            color: #6d5d4d;
            margin: 2px 0 0 0;
        }

        .preview-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            gap: 40px;
            position: relative;
        }

        .tag-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tag-label {
            font-size: 9px;
            color: #5d4f40;
            margin-bottom: 5px;
        }

        .tag-image {
            width: 180px;
            height: 420px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
        }

        /* 하단 컨트롤 */
        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-control {
            padding: 8px 15px;
            background: #1a1511;
            border: 1px solid #33281d;
            color: #8a735c;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
        }

        .copyright {
            font-size: 9px;
            color: #5d4f40;
        }

        /* SVG 아이콘 플레이스홀더 */
        .icon-small {
            width: 14px; height: 14px; margin-right: 4px; vertical-align: middle; fill: #8a735c;
        }

        /* 폰트 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
    </style>
</head>
<body>

<div class="container">
    <div class="input-panel">
        <div class="logo-main">
            <svg width="40" height="40" viewBox="0 0 100 100" style="margin-bottom:10px;">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#e0be97" stroke-width="2"/>
                <text x="50" y="65" text-anchor="middle" font-size="40" fill="#e0be97">虎</text>
            </svg>
            <h1>虎王宴</h1>
            <h1>목패 발급소</h1>
            <p>호왕의 어명에 따라 신분을 증명할 목패를 발급합니다.</p>
        </div>

        <div class="form-title">정보 입력</div>

        <div class="form-group">
            <label>이름</label>
            <input type="text" placeholder="이름을 입력하세요.">
        </div>

        <div class="form-group">
            <label>종족 (직접 입력)</label>
            <input type="text" placeholder="본인의 종족을 입력하세요.">
        </div>

        <div class="form-group">
            <label>신분(직업)</label>
            <input type="text" placeholder="신분을 입력하세요.">
        </div>

        <div class="form-group">
            <label>재주</label>
            <input type="text" placeholder="재주를 입력하세요.">
        </div>

        <div class="form-group">
            <label>번호</label>
            <input type="text" placeholder="번호를 입력하세요. (예: 虎-017)">
            <p style="font-size: 10px; color: #6d5d4d; margin: 4px 0 0 0;">비워두면 자동으로 생성됩니다.</p>
        </div>

        <button class="btn-issue">목패 발급하기</button>

        <ul class="notice-list">
            <li>유의사항</li>
            <li>발급된 목패는 자유롭게 사용 가능하나, 타인에게 양도 및 위조를 금합니다.</li>
        </ul>
    </div>

    <div class="preview-panel">
        <div class="preview-header">
            <h2>목패 미리보기</h2>
            <p>입력한 정보가 목패에 반영됩니다.</p>
        </div>

        <div class="preview-content">
            <div class="tag-container">
                <div class="tag-label">앞면</div>
                <div style="width: 180px; height: 420px; background: #2a221a; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px 0;">
                    <div style="width: 30px; height: 30px; border: 2px solid #e0be97; border-radius: 50%; color: #e0be97; display: flex; align-items: center; justify-content: center; font-size: 16px;">虎</div>
                    <div style="color: #e0be97; font-size: 24px; font-weight: bold;">虎王宴</div>
                    <div style="width: 80px; height: 80px; border: 1px solid #6d5d4d; border-radius: 50%;"></div>
                </div>
            </div>

            <div class="tag-container">
                <div class="tag-label">뒷면</div>
                <div style="width: 180px; height: 420px; background: #2a221a; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: flex-start;">
                    <div style="font-size: 16px; font-weight: bold; writing-mode: vertical-rl; text-orientation: upright; color: #e0be97; height: 300px;">호왕의 인 <br><br> 호왕청 발급</div>
                    <div style="margin-top: auto; width: 40px; height: 40px; border: 1px solid red; display: flex; align-items: center; justify-content: center; color: red; font-size: 11px;">虎王宴 <br> 宴宴</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-control">
                <svg class="icon-small" viewBox="0 0 24 24"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2z"/></svg>
                PNG로 저장
            </button>
            <button class="btn-control">
                <svg class="icon-small" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                새로 발급하기
            </button>
        </div>

        <div class="copyright" style="text-align: center; margin-top: 15px;">
            © 虎王宴 · All rights reserved.
        </div>
    </div>
</div>

</body>
</html>
