<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호왕연 목패 발급소</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0a08;
            color: #d4a773;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 1200px;
            height: 750px;
            display: flex;
            background: #0d0a08;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border: 1px solid #33281d;
            border-radius: 4px;
            overflow: hidden;
        }

        /* [왼쪽] 정보 입력 패널 - 고정된 어두운 테마 */
        .input-panel {
            width: 320px;
            padding: 40px;
            background: #0e0b09;
            border-right: 1px solid #221a13;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo-main {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-main h1 {
            font-size: 26px;
            font-weight: bold;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
            color: #e0be97;
        }
        .logo-main p {
            font-size: 11px;
            color: #8a735c;
            margin: 0;
            line-height: 1.5;
        }

        .form-title {
            font-size: 13px;
            color: #8a735c;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #221a13;
            padding-bottom: 5px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: #8a735c;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: #050403;
            border: 1px solid #221a13;
            color: #d4a773;
            font-size: 12px;
            box-sizing: border-box;
        }
        .form-group input::placeholder {
            color: #44372a;
        }

        .btn-issue {
            width: 100%;
            padding: 12px 0;
            background: #1c1510;
            border: 1px solid #44372a;
            color: #e0be97;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
        }

        .notice-list {
            margin-top: 15px;
            font-size: 10px;
            color: #514437;
            list-style: none;
            padding: 0;
            line-height: 1.4;
        }

        /* [오른쪽] 미리보기 패널 - 통째로 IMG_2887.jpg 배경 적용 */
        .preview-panel {
            flex-grow: 1;
            position: relative;
            background: url('IMG_2887.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 이미지 내부의 글자 가독성을 위해 살짝 어두운 오버레이 레이어 추가 */
        .preview-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15); /* 배경 분위기를 해치지 않을 정도의 최소 투명도 */
            z-index: 1;
        }

        .preview-header, .preview-content, .controls {
            position: relative;
            z-index: 2; /* 배경 이미지 위로 요소들을 올림 */
        }

        .preview-header h2 {
            margin: 0;
            font-size: 18px;
            color: #e0be97;
        }
        .preview-header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #8a735c;
        }

        /* 목패 내부 텍스트 배치 구조 */
        .preview-content {
            display: flex;
            justify-content: center;
            gap: 160px;
            margin-top: 40px;
        }

        .card-overlay-text {
            width: 200px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #e0be97;
        }

        /* 하단 컨트롤 바 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .copyright {
            font-size: 11px;
            color: #514437;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-control {
            padding: 6px 14px;
            background: rgba(14, 11, 9, 0.8);
            border: 1px solid #33281d;
            color: #8a735c;
            font-size: 11px;
            cursor: pointer;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
    </style>
</head>
<body>

<div class="container">
    <div class="input-panel">
        <div class="logo-main">
            <h1>虎王宴</h1>
            <h1>목패 발급소</h1>
            <p>호왕의 어명에 따라<br>신분을 증명할 목패를 발급합니다.</p>
        </div>

        <div class="form-title">정보 입력</div>

        <div class="form-group">
            <label>이름</label>
            <input type="text" placeholder="이름을 입력하세요.">
        </div>

        <div class="form-group">
            <label>종족</label>
            <input type="text" placeholder="본인의 종족을 입력하세요. (직접 입력)">
        </div>

        <div class="form-group">
            <label>신분(직업)</label>
            <input type="text" placeholder="신분을 입력하세요.">
        </div>

        <div class="form-group">
            <label>재주</label>
            <input type="text" placeholder="재주를 입력하세요.">
        </div>

        <div class="form-group">
            <label>번호</label>
            <input type="text" placeholder="번호를 입력하세요. (예: 虎-017)">
        </div>

        <button class="btn-issue">목패 발급하기</button>

        <ul class="notice-list">
            <li>* 유의사항</li>
            <li>발급된 목패는 자유롭게 사용 가능하나, 타인에게 양도 및 위조를 금합니다.</li>
        </ul>
    </div>

    <div class="preview-panel">
        <div class="preview-header">
            <h2>목패 미리보기</h2>
            <p>입력한 정보가 목패에 실시간으로 반영됩니다.</p>
        </div>

        <div class="preview-content">
            <div class="card-overlay-text">
                </div>

            <div class="card-overlay-text">
                </div>
        </div>

        <div class="controls">
            <div class="copyright">© 虎王宴 · All rights reserved.</div>
            <div class="btn-group">
                <button class="btn-control">PNG로 저장</button>
                <button class="btn-control">새로 발급하기</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
