<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호왕연 목패 발급소 (생성기)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0a08;
            color: #d4a773;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 1200px;
            height: 750px;
            display: flex;
            background: #0d0a08;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border: 1px solid #33281d;
            border-radius: 4px;
            overflow: hidden;
        }

        /* [왼쪽] 정보 입력 패널 */
        .input-panel {
            width: 320px;
            padding: 40px;
            background: #0e0b09;
            border-right: 1px solid #221a13;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo-main {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-main h1 {
            font-size: 26px;
            font-weight: bold;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
            color: #e0be97;
        }
        .logo-main p {
            font-size: 11px;
            color: #8a735c;
            margin: 0;
            line-height: 1.5;
        }

        .form-title {
            font-size: 13px;
            color: #8a735c;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #221a13;
            padding-bottom: 5px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: #8a735c;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: #050403;
            border: 1px solid #221a13;
            color: #d4a773;
            font-size: 12px;
            box-sizing: border-box;
        }
        .form-group input::placeholder {
            color: #44372a;
        }

        .btn-issue {
            width: 100%;
            padding: 12px 0;
            background: #1c1510;
            border: 1px solid #44372a;
            color: #e0be97;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
        }
        .btn-issue:hover {
            background: #291f16;
        }

        .notice-list {
            margin-top: 15px;
            font-size: 10px;
            color: #514437;
            list-style: none;
            padding: 0;
            line-height: 1.4;
        }

        /* [오른쪽] 미리보기 패널 (실제 캔버스가 렌더링되는 공간) */
        .preview-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            background: radial-gradient(circle at 50% 50%, #171310 0%, #0d0a08 100%);
        }

        .preview-header h2 {
            margin: 0;
            font-size: 18px;
            color: #e0be97;
        }
        .preview-header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #8a735c;
        }

        /* 캔버스 배치 영역 */
        .preview-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        canvas {
            max-width: 100%;
            max-height: 480px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border-radius: 8px;
            background: #14100d;
        }

        /* 하단 컨트롤 바 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .copyright {
            font-size: 11px;
            color: #514437;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-control {
            padding: 8px 16px;
            background: #1a1511;
            border: 1px solid #423425;
            color: #8a735c;
            font-size: 11px;
            cursor: pointer;
        }
        .btn-control:hover {
            border-color: #735d46;
            color: #d4a773;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
    </style>
</head>
<body>

<div class="container">
    <div class="input-panel">
        <div class="logo-main">
            <h1>虎王宴</h1>
            <h1>목패 발급소</h1>
            <p>호왕의 어명에 따라<br>신분을 증명할 목패를 발급합니다.</p>
        </div>

        <div class="form-title">정보 입력</div>

        <div class="form-group">
            <label>이름</label>
            <input type="text" id="inputName" placeholder="이름을 입력하세요." value="홍길동">
        </div>

        <div class="form-group">
            <label>종족 (직접 입력)</label>
            <input type="text" id="inputRace" placeholder="본인의 종족을 입력하세요." value="인간">
        </div>

        <div class="form-group">
            <label>신분(직업)</label>
            <input type="text" id="inputClass" placeholder="신분을 입력하세요." value="의적">
        </div>

        <div class="form-group">
            <label>재주</label>
            <input type="text" id="inputSkill" placeholder="재주를 입력하세요." value="분신술">
        </div>

        <div class="form-group">
            <label>번호</label>
            <input type="text" id="inputSerial" placeholder="번호를 입력하세요." value="虎-017">
        </div>

        <button class="btn-issue" id="btnUpdate">목패 반영하기</button>

        <ul class="notice-list">
            <li>* 유의사항</li>
            <li>발급된 목패는 자유롭게 사용 가능하나, 타인에게 양도 및 위조를 금합니다.</li>
        </ul>
    </div>

    <div class="preview-panel">
        <div class="preview-header">
            <h2>신분증 생성기</h2>
            <p>입력값이 배경 이미지 위에 Canvas 데이터로 결합됩니다.</p>
        </div>

        <div class="preview-content">
            <canvas id="idCanvas" width="1000" height="625"></canvas>
        </div>

        <div class="controls">
            <div class="copyright">© 虎王宴 · All rights reserved.</div>
            <div class="btn-group">
                <button class="btn-control" id="btnSave">PNG로 저장</button>
                <button class="btn-control" id="btnReset">새로 발급하기</button>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('idCanvas');
    const ctx = canvas.getContext('2d');

    // 원본 배경 이미지 객체 생성
    const bgImage = new Image();
    bgImage.src = 'IMG_2887.jpg'; // 동일 폴더 내 이미지 파일 매핑

    // 이미지가 로드되면 최초 1회 그리기
    bgImage.onload = function() {
        drawIdentityCard();
    };

    // Canvas 위에 배경과 글씨를 조합해서 그리는 핵심 함수
    function drawIdentityCard() {
        // 1. 기존 캔버스 초기화 및 배경 그리기
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // 입력창 값 가져오기
        const name = document.getElementById('inputName').value;
        const race = document.getElementById('inputRace').value;
        const idClass = document.getElementById('inputClass').value;
        const skill = document.getElementById('inputSkill').value;
        const serial = document.getElementById('inputSerial').value;

        // 글씨 스타일 정의 (고풍스런 황금빛 계열 색상 설정)
        ctx.fillStyle = '#dbb382';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 2. [앞면 목패 영역에 쓰기] -> 좌측 패널 (대략 X: 275 기준)
        ctx.font = 'bold 24px "Noto Sans KR"';
        ctx.fillText(name, 275, 260); // 이름 배치

        ctx.font = '16px "Noto Sans KR"';
        ctx.fillText(`종족: ${race}`, 275, 310);
        ctx.fillText(`신분: ${idClass}`, 275, 345);
        ctx.fillText(`재주: ${skill}`, 275, 380);
        
        ctx.font = '14px "Noto Sans KR"';
        ctx.fillStyle = '#8a735c';
        ctx.fillText(serial, 275, 430); // 시리얼 번호 하단 배치

        // 3. [뒷면 목패 영역에 쓰기] -> 우측 패널 (대략 X: 725 기준 세로쓰기 구현)
        ctx.fillStyle = '#c49e72';
        ctx.font = 'bold 26px "Noto Sans KR"';
        
        // 전통 목패 감성을 위한 '이름' 세로쓰기 함수 호출
        drawVerticalText(name + " 의 인", 725, 200, 35);
    }

    // Canvas 한글 세로쓰기 지원 서브 함수
    function drawVerticalText(text, x, startY, spacing) {
        for (let i = 0; i < text.length; i++) {
            ctx.fillText(text[i], x, startY + (i * spacing));
        }
    }

    // 이벤트 리스너 설정
    // 1) 입력칸에 타이핑할 때마다 실시간으로 화면 갱신
    const inputs = ['inputName', 'inputRace', 'inputClass', 'inputSkill', 'inputSerial'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', drawIdentityCard);
    });

    // 2) 반영하기 버튼 클릭 시 수동 갱신
    document.getElementById('btnUpdate').addEventListener('click', drawIdentityCard);

    // 3) PNG로 저장 버튼 (Canvas 데이터를 이미지 파일로 다운로드)
    document.getElementById('btnSave').addEventListener('click', function() {
        const link = document.createElement('a');
        link.download = `호왕연_목패_${document.getElementById('inputName').value}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    // 4) 새로 발급하기 (입력 필드 초기화)
    document.getElementById('btnReset').addEventListener('click', function() {
        inputs.forEach(id => document.getElementById(id).value = '');
        drawIdentityCard();
    });
</script>

</body>
</html>
