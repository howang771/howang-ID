<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub ID 발급소</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0a08;
            color: #d4a773;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 1200px;
            height: 750px;
            display: flex;
            background: #0d0a08;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border: 1px solid #33281d;
            border-radius: 4px;
            position: relative;
        }

        /* 왼쪽 정보 입력 창 */
        .input-panel {
            width: 320px;
            padding: 40px;
            background: rgba(20, 16, 13, 0.6);
            border-right: 1px solid rgba(51, 40, 29, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .logo-main {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .github-icon-main {
            width: 50px;
            height: 50px;
            margin-bottom: 15px;
            fill: #d4a773;
        }

        .logo-main h1 {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }
        .logo-main p {
            font-size: 11px;
            color: #8a735c;
            margin: 5px 0 0 0;
            line-height: 1.5;
            word-break: keep-all;
        }

        .form-title {
            font-size: 14px;
            color: #e0be97;
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
            border-bottom: 1px solid #33281d;
            padding-bottom: 5px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: #8a735c;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #423425;
            color: #d4a773;
            font-size: 12px;
            border-radius: 2px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #8a735c;
        }
        .form-group input::placeholder {
            color: #5d4f40;
        }

        .btn-issue {
            width: 100%;
            padding: 14px 0;
            background: linear-gradient(180deg, #4a3525 0%, #291f16 100%);
            border: 1px solid #735d46;
            color: #e0be97;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            transition: background 0.2s;
        }
        .btn-issue:hover {
            background: linear-gradient(180deg, #5c432f 0%, #33271c 100%);
        }

        .notice-list {
            margin-top: 20px;
            font-size: 10px;
            color: #6d5d4d;
            list-style: none;
            padding: 0;
            width: 100%;
            line-height: 1.5;
        }
        .notice-list li.notice-title {
            color: #8a735c;
            margin-bottom: 4px;
            font-weight: bold;
        }

        /* 오른쪽 목패 프리뷰 영역 */
        .preview-panel {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, #171310 0%, #0d0a08 100%);
            box-sizing: border-box;
        }

        .preview-header {
            text-align: left;
            margin-bottom: 30px;
        }
        .preview-header h2 {
            font-size: 18px;
            margin: 0;
            color: #e0be97;
        }
        .preview-header p {
            font-size: 11px;
            color: #8a735c;
            margin: 4px 0 0 0;
        }

        .preview-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            gap: 60px;
            align-items: center;
        }

        .tag-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tag-label {
            font-size: 11px;
            color: #8a735c;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        /* 목패 이미지 래퍼 및 마스크 */
        .tag-card-wrapper {
            width: 250px;
            height: 480px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 1px solid #291f16;
            position: relative;
            background: #14100d;
        }

        /* IMG_2887.jpg 매핑 및 비율 유지 스케일링 */
        .tag-card-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 하단 컨트롤 */
        .controls {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

            background: #1a1511;
